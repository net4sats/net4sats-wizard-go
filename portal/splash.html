<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./assets/icon/colour/net4sats-icon-colour.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#111" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.json" />
    <title>net4sats</title>
    <script type="module" crossorigin src="./assets/splash-C0y8YH4o.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/splash-Cmh1iVkv.css">
    <script>
    // DLEQ Error Interceptor — translates backend "invalid DLEQ proof" into
    // a user-friendly message. This is a temporary UX mitigation until the
    // upstream gonuts-tollgate library is patched to handle keyset rotation.
    (function() {
      var DLEQ_MESSAGE = 'This e-cash note uses an outdated mint key. The mint has rotated its security keys since this token was created. Please obtain a fresh token from the mint and try again.';
      var DLEQ_PATTERN = /dleq/i;

      // --- Fetch interceptor ---
      // Monkey-patch window.fetch to intercept error responses and replace
      // DLEQ-related error messages with the user-friendly text.
      var origFetch = window.fetch;
      window.fetch = function() {
        var args = arguments;
        return origFetch.apply(this, args).then(function(resp) {
          if (resp.ok) return resp;
          // Clone, read the body, and if it contains "dleq", return a modified
          // response with the user-friendly message.
          return resp.clone().text().then(function(bodyText) {
            if (DLEQ_PATTERN.test(bodyText)) {
              try {
                var data = JSON.parse(bodyText);
                if (data && data.content) {
                  data.content = DLEQ_MESSAGE;
                }
                // Also check tags for the DLEQ error code
                if (data && data.tags && Array.isArray(data.tags)) {
                  for (var i = 0; i < data.tags.length; i++) {
                    if (Array.isArray(data.tags[i]) && data.tags[i][0] === 'code' &&
                        data.tags[i][1] && data.tags[i][1].indexOf('dleq') !== -1) {
                      data.content = DLEQ_MESSAGE;
                      break;
                    }
                  }
                }
                return new Response(JSON.stringify(data), {
                  status: resp.status,
                  statusText: resp.statusText,
                  headers: resp.headers
                });
              } catch(e) {
                // Body isn't JSON — fall through to return original response
              }
            }
            return resp;
          }).catch(function() {
            return resp;
          });
        });
      };

      // --- MutationObserver fallback ---
      // Catches DLEQ error text that gets rendered into the DOM directly.
      function replaceDleqText(el) {
        if (el.nodeType === 3) { // Text node
          if (DLEQ_PATTERN.test(el.textContent)) {
            el.textContent = DLEQ_MESSAGE;
          }
        } else if (el.querySelectorAll) {
          var elements = el.querySelectorAll('*');
          for (var i = 0; i < elements.length; i++) {
            var child = elements[i];
            if (child.children.length === 0 && DLEQ_PATTERN.test(child.textContent)) {
              child.textContent = DLEQ_MESSAGE;
            }
          }
        }
      }

      var observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          mutation.addedNodes.forEach(function(node) {
            if (node.nodeType === 3) {
              replaceDleqText(node);
            } else if (node.querySelectorAll) {
              replaceDleqText(node);
            }
          });
        });
      });

      // Start observing once DOM is ready
      if (document.body) {
        observer.observe(document.body, { childList: true, subtree: true, characterData: true });
      } else {
        document.addEventListener('DOMContentLoaded', function() {
          observer.observe(document.body, { childList: true, subtree: true, characterData: true });
        });
      }
    })();
    </script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
